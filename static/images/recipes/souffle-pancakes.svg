<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="Illustration: Japanische Soufflé-Pfannkuchen">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde8d2"/>
      <stop offset="1" stop-color="#f9cf9f"/>
    </linearGradient>
    <linearGradient id="cake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbd98a"/>
      <stop offset="1" stop-color="#eeb960"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#bg)"/>
  <circle cx="400" cy="265" r="215" fill="#fff7e8" opacity="0.8"/>
  <!-- sparkles -->
  <g fill="#e08a3c" opacity="0.55">
    <path d="M130 130l5 14 14 5-14 5-5 14-5-14-14-5 14-5z"/>
    <path d="M672 120l4 11 11 4-11 4-4 11-4-11-11-4 11-4z"/>
    <path d="M660 410l4 11 11 4-11 4-4 11-4-11-11-4 11-4z"/>
    <path d="M125 395l3 9 9 3-9 3-3 9-3-9-9-3 9-3z"/>
  </g>
  <!-- powdered sugar -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="330" cy="150" r="4"/><circle cx="365" cy="132" r="3"/>
    <circle cx="402" cy="148" r="4"/><circle cx="440" cy="130" r="3"/>
    <circle cx="472" cy="152" r="4"/><circle cx="372" cy="168" r="3"/>
    <circle cx="436" cy="166" r="3"/>
  </g>
  <!-- plate -->
  <ellipse cx="400" cy="425" rx="258" ry="32" fill="#b97c3e" opacity="0.25"/>
  <ellipse cx="400" cy="400" rx="255" ry="72" fill="#ffffff"/>
  <ellipse cx="400" cy="394" rx="218" ry="58" fill="#fdeede"/>
  <!-- pancake stack: three wobbly tall cakes -->
  <g stroke="#d99b3f" stroke-width="3">
    <path d="M258 358c0-26 22-40 60-44 36-4 130-4 166 0 38 4 60 18 60 44 0 28-40 42-143 42s-143-14-143-42z" fill="url(#cake)"/>
    <path d="M268 300c0-26 20-38 56-42 34-4 120-4 152 0 36 4 56 16 56 42 0 28-36 40-132 40s-132-12-132-40z" fill="url(#cake)"/>
    <path d="M282 244c0-24 18-36 50-40 30-4 106-4 134 0 32 4 50 16 50 40 0 26-32 38-117 38s-117-12-117-38z" fill="url(#cake)"/>
  </g>
  <!-- golden tops -->
  <ellipse cx="399" cy="240" rx="100" ry="22" fill="#f7c873"/>
  <!-- butter -->
  <g transform="rotate(-6 400 222)">
    <rect x="372" y="206" width="56" height="30" rx="6" fill="#ffe9a8"/>
    <rect x="372" y="206" width="56" height="14" rx="6" fill="#fff4cd"/>
  </g>
  <!-- syrup drips -->
  <path d="M300 250c0-14 44-24 100-24s100 10 100 24c0 10-12 14-20 26-6 10-18 6-22 18-3 10-16 8-20 0-5-11-16-8-22-2-8 8-20 6-24-4-4-9-14-10-20-4-8 8-20 6-24-4-5-12-16-10-22-18-8-9-26-2-26-12z" fill="#c97a2d" opacity="0.85"/>
  <!-- berries -->
  <g>
    <circle cx="252" cy="392" r="20" fill="#c0392b"/>
    <circle cx="246" cy="386" r="6" fill="#e2654f" opacity="0.8"/>
    <circle cx="292" cy="408" r="16" fill="#5b4a8a"/>
    <circle cx="287" cy="403" r="5" fill="#7d6ab0" opacity="0.9"/>
    <circle cx="540" cy="398" r="18" fill="#5b4a8a"/>
    <circle cx="535" cy="393" r="5" fill="#7d6ab0" opacity="0.9"/>
    <circle cx="578" cy="384" r="20" fill="#c0392b"/>
    <circle cx="572" cy="378" r="6" fill="#e2654f" opacity="0.8"/>
    <path d="M578 366c4-8 12-10 18-8-2 8-10 12-18 8z" fill="#54994c"/>
  </g>
  <!-- wobble lines -->
  <g stroke="#e08a3c" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6">
    <path d="M196 286c-10 4-16 12-18 22"/>
    <path d="M608 286c10 4 16 12 18 22"/>
  </g>
