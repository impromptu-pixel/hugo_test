<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="Illustration: Chicken Tikka Masala">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbe3bd"/>
      <stop offset="1" stop-color="#f3bd7e"/>
    </linearGradient>
    <linearGradient id="curry" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8842c"/>
      <stop offset="1" stop-color="#cf5f1d"/>
    </linearGradient>
    <linearGradient id="bowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#365b6d"/>
      <stop offset="1" stop-color="#23404e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#bg)"/>
  <circle cx="385" cy="270" r="215" fill="#fff3df" opacity="0.8"/>
  <!-- sparkles -->
  <g fill="#c2502e" opacity="0.5">
    <path d="M125 120l5 14 14 5-14 5-5 14-5-14-14-5 14-5z"/>
    <path d="M676 140l4 11 11 4-11 4-4 11-4-11-11-4 11-4z"/>
    <path d="M150 410l3 9 9 3-9 3-3 9-3-9-9-3 9-3z"/>
  </g>
  <!-- steam -->
  <g stroke="#bdae9b" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.55">
    <path d="M320 132c-12 22 12 32 0 54"/>
    <path d="M380 114c-12 22 12 32 0 54"/>
    <path d="M440 132c-12 22 12 32 0 54"/>
  </g>
  <!-- naan -->
  <g transform="rotate(-14 640 330)">
    <path d="M560 270c10-34 50-52 88-40 40 12 54 50 36 88-16 34-58 48-92 30-30-16-40-48-32-78z" fill="#e8c98e"/>
    <path d="M572 276c8-26 40-40 68-31" stroke="#d3ab63" stroke-width="6" stroke-linecap="round" fill="none"/>
    <g fill="#b98a45" opacity="0.8">
      <circle cx="600" cy="300" r="5"/><circle cx="634" cy="288" r="4"/>
      <circle cx="640" cy="324" r="5"/><circle cx="606" cy="334" r="4"/>
    </g>
  </g>
  <!-- bowl -->
  <ellipse cx="385" cy="430" rx="240" ry="30" fill="#8a4b2a" opacity="0.25"/>
  <path d="M180 310c0 80 70 122 205 122s205-42 205-122z" fill="url(#bowl)"/>
  <ellipse cx="385" cy="310" rx="205" ry="52" fill="#1c3540"/>
  <!-- curry -->
  <ellipse cx="385" cy="310" rx="188" ry="44" fill="url(#curry)"/>
  <!-- chicken chunks -->
  <g fill="#b34a1b" stroke="#8f3812" stroke-width="3">
    <rect x="290" y="282" width="52" height="38" rx="12" transform="rotate(-8 316 301)"/>
    <rect x="392" y="276" width="56" height="40" rx="12" transform="rotate(6 420 296)"/>
    <rect x="338" y="306" width="48" height="34" rx="11" transform="rotate(-4 362 323)"/>
    <rect x="456" y="300" width="46" height="34" rx="11" transform="rotate(10 479 317)"/>
  </g>
  <!-- cream swirl -->
  <path d="M250 318c30-12 60 8 95 0s55-16 90-6 60 12 85-2" stroke="#fff3df" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- cilantro -->
  <g fill="#3f7d3a">
    <path d="M320 270c6-10 18-12 26-8-2 10-14 16-26 8z"/>
    <path d="M442 264c6-10 18-12 26-8-2 10-14 16-26 8z"/>
    <path d="M386 318c6-10 18-12 26-8-2 10-14 16-26 8z" opacity="0.9"/>
  </g>
  <!-- spice dots -->
  <g fill="#7c2415" opacity="0.7">
    <circle cx="270" cy="320" r="4"/><circle cx="500" cy="326" r="4"/>
    <circle cx="420" cy="332" r="3"/><circle cx="310" cy="336" r="3"/>
  </g>
  <!-- spoon -->
  <g transform="rotate(20 130 320)">
    <rect x="124" y="250" width="13" height="130" rx="6.5" fill="#9c6b3f"/>
    <ellipse cx="130" cy="236" rx="24" ry="30" fill="#b5824f"/>
    <ellipse cx="130" cy="232" rx="16" ry="20" fill="#e8842c"/>
  </g>
</svg>
