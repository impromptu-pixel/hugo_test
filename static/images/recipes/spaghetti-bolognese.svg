  <g fill="#7c2415">
    <circle cx="320" cy="306" r="9"/>
    <circle cx="372" cy="288" r="8"/>
    <circle cx="428" cy="300" r="10"/>
    <circle cx="478" cy="318" r="8"/>
    <circle cx="350" cy="330" r="7"/>
    <circle cx="450" cy="340" r="7"/>
  </g>
  <!-- parmesan -->
  <g fill="#fff8e6">
    <rect x="336" y="276" width="14" height="6" rx="3" transform="rotate(18 343 279)"/>
    <rect x="400" y="266" width="14" height="6" rx="3" transform="rotate(-12 407 269)"/>
    <rect x="452" y="284" width="14" height="6" rx="3" transform="rotate(24 459 287)"/>
    <rect x="386" y="310" width="12" height="5" rx="2.5" transform="rotate(-20 392 312)"/>
  </g>
  <!-- basil -->
  <g>
    <path d="M398 252c14-18 38-20 52-10-4 18-26 30-44 24-6-2-10-8-8-14z" fill="#3f7d3a"/>
    <path d="M392 258c-12-14-32-14-44-4 4 14 22 22 36 16 5-2 9-8 8-12z" fill="#54994c"/>
