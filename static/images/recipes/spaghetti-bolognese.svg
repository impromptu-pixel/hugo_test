    <path d="M220 380c70-52 150-60 190-46s125 4 175 42"/>
    <path d="M245 392c60-38 120-66 160-52s130 16 160 46"/>
    <path d="M260 350c55-30 115-30 150-20s110 0 140 26"/>
  </g>
  <g stroke="#e2ad3b" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.8">
    <path d="M250 372c70-44 150-52 185-40s115 6 150 36"/>
    <path d="M280 348c60-28 120-30 150-22s95 4 125 24"/>
  </g>
  <!-- sauce -->
  <path d="M268 330c10-38 60-66 132-66s124 26 134 62c6 24-26 40-66 34-20-4-30 12-68 10s-36-14-62-10c-40 6-76-6-70-30z" fill="url(#sauce)"/>
