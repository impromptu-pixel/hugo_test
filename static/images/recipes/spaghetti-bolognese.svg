  <g transform="rotate(12 690 300)">
    <rect x="682" y="240" width="14" height="160" rx="7" fill="#9c6b3f"/>
    <path d="M674 196h6v44h6v-44h6v44h6v-44h6v50c0 10-7 16-15 16s-15-6-15-16z" fill="#b5824f"/>
