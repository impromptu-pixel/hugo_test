<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="Illustration: Spaghetti Bolognese">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7e0c3"/>
      <stop offset="1" stop-color="#f0bf93"/>
    </linearGradient>
    <linearGradient id="sauce" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d04a2a"/>
      <stop offset="1" stop-color="#a83220"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#bg)"/>
  <circle cx="400" cy="270" r="215" fill="#fff4e3" opacity="0.75"/>
  <!-- sparkles -->
  <g fill="#c2502e" opacity="0.5">
    <path d="M120 110l5 14 14 5-14 5-5 14-5-14-14-5 14-5z"/>
    <path d="M680 150l4 11 11 4-11 4-4 11-4-11-11-4 11-4z"/>
    <path d="M650 420l4 11 11 4-11 4-4 11-4-11-11-4 11-4z"/>
    <path d="M140 400l3 9 9 3-9 3-3 9-3-9-9-3 9-3z"/>
  </g>
  <!-- steam -->
  <g stroke="#b9b0a2" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.55">
    <path d="M340 130c-12 22 12 32 0 54"/>
    <path d="M400 112c-12 22 12 32 0 54"/>
    <path d="M460 130c-12 22 12 32 0 54"/>
  </g>
  <!-- plate -->
