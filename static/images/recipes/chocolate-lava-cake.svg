<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="Illustration: Schokoladen-Lava-Kuchen">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9d2c0"/>
      <stop offset="1" stop-color="#cfa181"/>
    </linearGradient>
    <linearGradient id="cake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a3522"/>
      <stop offset="1" stop-color="#3c2113"/>
    </linearGradient>
    <linearGradient id="lava" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a4a22"/>
      <stop offset="1" stop-color="#6b3414"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#bg)"/>
  <circle cx="390" cy="275" r="215" fill="#f6e7d8" opacity="0.8"/>
  <!-- sparkles -->
  <g fill="#8a4a22" opacity="0.55">
    <path d="M135 125l5 14 14 5-14 5-5 14-5-14-14-5 14-5z"/>
    <path d="M672 150l4 11 11 4-11 4-4 11-4-11-11-4 11-4z"/>
    <path d="M655 415l4 11 11 4-11 4-4 11-4-11-11-4 11-4z"/>
  </g>
  <!-- steam -->
  <g stroke="#a98e77" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.6">
    <path d="M350 130c-12 22 12 32 0 54"/>
    <path d="M410 112c-12 22 12 32 0 54"/>
  </g>
  <!-- plate -->
  <ellipse cx="390" cy="428" rx="252" ry="32" fill="#5a3522" opacity="0.3"/>
  <ellipse cx="390" cy="404" rx="250" ry="70" fill="#ffffff"/>
  <ellipse cx="390" cy="398" rx="214" ry="56" fill="#f6ebdd"/>
  <!-- cocoa dusting on plate -->
  <g fill="#7c5a3e" opacity="0.5">
