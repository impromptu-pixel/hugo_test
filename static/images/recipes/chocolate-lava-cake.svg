    <circle cx="500" cy="408" r="4"/><circle cx="530" cy="392" r="3"/>
  </g>
  <!-- cake cylinder -->
  <path d="M300 248c0-14 40-24 90-24s90 10 90 24v120c0 16-40 26-90 26s-90-10-90-26z" fill="url(#cake)"/>
  <ellipse cx="390" cy="248" rx="90" ry="22" fill="#6b4026"/>
  <!-- molten lava flow -->
  <path d="M306 254c20 12 52 16 84 16s64-4 84-16c4 22-10 34-18 52-6 14-22 12-26 28-3 12-18 12-22 2-5-12-18-10-24-2-7 10-20 8-24-4-4-11-15-12-21-5-8 9-19 5-21-6-3-17-18-20-24-37-4-12-12-18 12-28z" fill="url(#lava)" opacity="0"/>
  <path d="M312 252c20 10 48 14 78 14s58-4 78-14c3 16-6 24-12 40-5 13-18 10-22 24-3 11-15 11-19 2-4-11-15-9-20-2-6 9-17 7-20-3-3-10-13-11-18-4-7 8-16 4-18-5-2-14-15-17-20-31-3-10-10-13 7-21z" fill="#8a4a22"/>
  <!-- lava pour from top -->
  <path d="M338 240c14 4 34 6 52 6s38-2 52-6c8 2 8 8 0 10-14 4-34 6-52 6s-38-2-52-6c-8-2-8-8 0-10z" fill="#9c5526"/>
  <path d="M430 366c-6-44 4-78 22-108l16 8c-16 28-24 58-18 96z" fill="#8a4a22"/>
  <ellipse cx="442" cy="382" rx="34" ry="12" fill="#8a4a22"/>
  <!-- powdered sugar -->
  <g fill="#ffffff" opacity="0.95">
    <circle cx="350" cy="240" r="3.5"/><circle cx="382" cy="236" r="3"/>
    <circle cx="416" cy="240" r="3.5"/><circle cx="398" cy="246" r="2.5"/>
    <circle cx="366" cy="246" r="2.5"/>
  </g>
  <!-- raspberries -->
  <g>
    <circle cx="284" cy="404" r="17" fill="#b3304e"/>
    <circle cx="278" cy="398" r="5" fill="#d65f78" opacity="0.9"/>
    <circle cx="316" cy="416" r="13" fill="#b3304e"/>
    <circle cx="312" cy="412" r="4" fill="#d65f78" opacity="0.9"/>
    <path d="M284 386c4-9 13-11 19-9-2 9-11 13-19 9z" fill="#54994c"/>
  </g>
  <!-- ice cream scoop -->
  <g>
    <ellipse cx="546" cy="394" rx="44" ry="16" fill="#e8d8c2"/>
    <circle cx="546" cy="372" r="34" fill="#fdf6e6"/>
    <path d="M518 364c8 10 22 14 34 12" stroke="#e8d3ae" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M548 346c5-8 13-10 19-8-2 8-11 12-19 8z" fill="#54994c"/>
  </g>
